services:
  bot-forward:
    build: .
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - ALLOW_DIRECT_FALLBACK=${ALLOW_DIRECT_FALLBACK:-1}
      - PREFER_SOCKS5H=${PREFER_SOCKS5H:-1}
    volumes:
      - bot_data_forward:/app/data
    restart: unless-stopped

volumes:
  bot_data_forward:
